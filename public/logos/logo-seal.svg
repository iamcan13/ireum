<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 64" role="img" aria-label="이음 Ieum wordmark">
  <!-- The maker's seal, then geometric 이음 lettering built from primitives
       (self-contained, no font dependency) so it renders identically everywhere. -->

  <!-- Seal mark, reused and scaled (64 -> 44px) -->
  <g transform="translate(8,10) scale(0.6875)">
    <path fill="#DC6F4F" fill-rule="evenodd"
          d="M 20,5.5
             L 44,5
             C 52,5 59,12 59,20
             L 59,43.5
             C 59,52 51.5,59 44,59
             L 20.5,59
             C 12,59 5,51.5 5,44
             L 5,20.5
             C 5,12 12.5,5 20,5.5
             Z
             M 10,25 A 14,14 0 1,0 38,25 A 14,14 0 1,0 10,25 Z
             M 16.5,25 A 7.5,7.5 0 1,0 31.5,25 A 7.5,7.5 0 1,0 16.5,25 Z
             M 26,39 A 14,14 0 1,0 54,39 A 14,14 0 1,0 26,39 Z
             M 32.5,39 A 7.5,7.5 0 1,0 47.5,39 A 7.5,7.5 0 1,0 32.5,39 Z" />
  </g>

  <!-- 이음 lettering, warm geometric strokes in ink -->
  <g fill="none" stroke="#2B2620" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- 이  (ㅇ + ㅣ) -->
    <circle cx="84" cy="32" r="13" />
    <line x1="110" y1="12" x2="110" y2="52" />

    <!-- 음  (ㅇ / ㅡ / ㅁ) -->
    <circle cx="154" cy="22" r="8.5" />
    <line x1="133" y1="34" x2="175" y2="34" />
    <rect x="136" y="39" width="36" height="13" rx="3.5" />
  </g>
</svg>
